name: AI — build image & deploy VM

on:
  push:
    branches:
      - staging
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_to_vm:
        description: 'SSH lên VM và docker compose (cần secrets VM_*)'
        required: false
        type: boolean
        default: true
      image_tag_override:
        description: 'Tag tùy chọn (để trống = staging-/production- theo nhánh)'
        required: false
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: medicalink-ai

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.image_tag_override }}" ]; then
            TAG="${{ github.event.inputs.image_tag_override }}"
          elif [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "master" ]; then
            TAG="production-${{ github.sha }}"
          else
            TAG="staging-${{ github.sha }}"
          fi
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=${{ env.REGISTRY }}/$OWNER_LC/${{ env.IMAGE_NAME }}:$TAG" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy-vm:
    needs: build-and-push
    if: |
      always() && needs.build-and-push.result == 'success' &&
      (github.event_name == 'push' || github.event.inputs.deploy_to_vm == true)
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || github.ref_name == 'master' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          VM_GIT_PULL: 'true'
        run: |
          chmod +x scripts/deploy-from-ghcr.sh
          ./scripts/deploy-from-ghcr.sh "${{ needs.build-and-push.outputs.image_tag }}"
