name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - staging
  push:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install . --no-deps

      - name: Byte-compile
        run: python -m compileall -q medicalink_ai

      - name: Docker build (verify Dockerfile)
        run: docker build -t medicalink-ai:ci .
